<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homestay Hanis - Percutian Selesa Anda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80'); background-size: cover; background-position: center; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Hero Section -->
    <header class="hero-gradient h-screen flex flex-col justify-center items-center text-white text-center px-4">
        <h1 class="text-5xl md:text-6xl font-bold mb-4">Homestay Hanis</h1>
        <p class="text-xl md:text-2xl mb-8">Keselesaan bak rumah sendiri untuk percutian keluarga anda.</p>
        <a href="#booking" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-semibold transition">Tempah Sekarang</a>
    </header>

    <!-- Booking Form Section -->
    <section id="booking" class="py-16 px-4 max-w-2xl mx-auto">
        <h2 class="text-3xl font-bold text-center mb-8">Borang Tempahan</h2>
        <form id="bookingForm" class="bg-white p-8 rounded-2xl shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" name="nama" placeholder="Nama Penuh" required class="w-full p-3 border rounded-lg">
                <input type="tel" name="tel" placeholder="No. Telefon" required class="w-full p-3 border rounded-lg">
                <input type="email" name="email" placeholder="Email" required class="w-full p-3 border rounded-lg">
                <input type="text" name="alamat" placeholder="Alamat" required class="w-full p-3 border rounded-lg">
                <input type="date" name="checkin" required class="w-full p-3 border rounded-lg">
                <input type="date" name="checkout" required class="w-full p-3 border rounded-lg">
            </div>
            <button type="submit" id="submitBtn" class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold transition">Hantar Tempahan</button>
        </form>
        <div id="statusMessage" class="mt-4 text-center hidden font-semibold"></div>
    </section>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxOLeQlfBB76aBxfnLwYEhE8Pqde_k9g1qGRwYpjU0u-0MRXSfcIHEI4ho0vLwxxv8u/exec';
        const form = document.getElementById('bookingForm');
        const status = document.getElementById('statusMessage');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Memproses...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(() => {
                    status.classList.remove('hidden', 'text-red-600');
                    status.classList.add('text-green-600');
                    status.innerText = "Terima kasih! Tempahan anda telah diterima. Kami akan hubungi anda melalui WhatsApp segera.";
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "Hantar Tempahan";
                })
                .catch(error => {
                    status.classList.remove('hidden', 'text-green-600');
                    status.classList.add('text-red-600');
                    status.innerText = "Maaf, ralat berlaku. Sila cuba lagi.";
                    btn.disabled = false;
                    btn.innerText = "Hantar Tempahan";
                });
        });
    </script>
</body>
</html>
