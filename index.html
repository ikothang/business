<body>
    <!-- (Kod asal anda di sini) -->
    
    <script>
        // URL Google Script anda yang telah dikemaskini
        const EXCEL_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxOLeQlfBB76aBxfnLwYEhE8Pqde_k9g1qGRwYpjU0u-0MRXSfcIHEI4ho0vLwxxv8u/exec";

        // Fungsi penghantaran data ke Google Sheet
        async function hantarKeGoogleSheet(data) {
            try {
                const response = await fetch(EXCEL_WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                console.log("Data berjaya dihantar ke Google Sheet.");
            } catch (err) {
                console.error("Ralat menghantar data:", err);
            }
        }

        // Fungsi ini dipanggil dalam event listener form submit anda
        // Pastikan anda memanggil hantarKeGoogleSheet(payload) di dalam fungsi form submit anda
    </script>
</body>
